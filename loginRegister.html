<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Brand Optical Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/fontawesome.min.css" integrity="sha512-B46MVOJpI6RBsdcU307elYeStF2JKT87SsHZfRSkjVi4/iZ3912zXi45X5/CBr/GbCyLx6M1GQtTKYRd52Jxgw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/loginRegister.css">
</head>
<body>
    <div class="container single-login">
        <div class="login-visual">
            <div class="visual-copy">
                <p class="eyebrow">Best Brand Optical</p>
                <h1>Sign in to your workspace</h1>
                <p class="visual-text">
                    Access customers, orders, prescriptions, and daily shop updates from one place.
                </p>
            </div>
        </div>

        <div class="login-panel">
            <div id="toast" class="toast">
                <span id="toast-message"></span>
            </div>

            <form id="login-form">
                <h2 class="heading">Welcome back</h2>
                <p class="form-copy">Use the username and password stored in your Login Access sheet.</p>
                <input type="text" id="email-login" placeholder="Username" required>
                <input type="password" id="password-login" placeholder="Password" required>
                <label class="remember-row" for="remember-login">
                    <input type="checkbox" id="remember-login">
                    <span>Remember my login</span>
                </label>
                <button type="button" id="log">Sign in</button>
            </form>

            <div id="app-choice" class="app-choice" hidden>
                <h2 class="heading">Where would you like to go?</h2>
                <p class="form-copy">Choose the workspace you want to open now.</p>
                <button type="button" class="choice-button" data-destination="Fill_APP.html">
                    <span>Customer Data Filling</span>
                </button>
                <button type="button" class="choice-button choice-button-secondary" data-destination="index.html">
                    <span>Dashboard Web App</span>
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
    </div>

    <script src="js/loginRegister.js"></script>
</body>
</html>
